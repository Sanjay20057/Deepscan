services:
  - type: web
    name: deepscan-backend
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: FASTAPI_BASE_URL
        value: http://localhost:8000
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MAX_UPLOAD_MB
        value: "200"
      - key: NETLIFY_ORIGIN
        value: "https://YOUR-SITE.netlify.app"
    disk:
      name: model-storage
      mountPath: /opt/render/project/src
      sizeGB: 1
